<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page | iDigital </title>
    <!-- Link :: Font Familysatoshi -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@1,2&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="assets/css/basic.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
  </head>
  <body>
    <!-- START :: iDigital Header Section 
     ----------------------------------------- -->
    <header class="digital-header-section">
      <div class="container">
        <!-- Digital Header Container  -->
        <div class="digital-header-container">
          <!-- iDigital Header Logo  -->
          <h1 class="digital-header-logo">
            <a href="#">IDigital</a>
          </h1>

          <!-- this is Comment -->

          <!-- Header Navigations  -->
          <nav class="header-navigation-wrapper">
            <!-- Navigation List  -->
            <ul class="header-navigation-list">
              <!-- Home  -->
              <li class="header-nav-item">
                <a href="#">Home </a>
              </li>

              <!-- Services  -->
              <li class="header-nav-item">
                <a href="#">Services </a>
              </li>

              <!-- Support  -->
              <li class="header-nav-item">
                <a href="#">Support </a>
              </li>

              <!-- Shop Online Store  -->
              <li class="header-nav-item">
                <a href="#">Shop Online Store </a>
              </li>
            </ul>

            <!-- Header CTA button  
                    -->
            <div class="header-cta-button-wrapper">
              <!-- Input label  -->
              <div class="input-label">
                <input type="Search Here " />

                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="28"
                  height="28"
                  viewBox="0 0 28 28"
                  fill="none">
                  <path
                    d="M21.2222 21.2222L27 27"
                    stroke="black"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round" />
                  <path
                    d="M1 12.5556C1 18.9375 6.17362 24.1111 12.5556 24.1111C15.7522 24.1111 18.6455 22.8133 20.7375 20.7157C22.8223 18.6254 24.1112 15.741 24.1112 12.5556C24.1112 6.1736 18.9376 1 12.5556 1C6.17362 1 1 6.1736 1 12.5556Z"
                    stroke="black"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round" />
                </svg>
              </div>

              <button class="cta-btn">
                <span>Start Your Repair </span>
                <div class="arrow-svg">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="26"
                    height="26"
                    viewBox="0 0 26 27"
                    fill="none">
                    <path
                      d="M13.447 6.8222C13.5652 6.5096 13.7755 6.42465 14.0777 6.56737L21.3048 9.47343C21.6231 9.58023 21.7049 9.78259 21.5501 10.0805L18.3701 17.1913C18.2518 17.5039 18.0416 17.5889 17.7393 17.4462L16.6596 17.0438C16.3311 16.9117 16.2443 16.6967 16.399 16.3988L18.3964 12.1491L4.79613 17.644C4.48076 17.7714 4.26176 17.6834 4.13912 17.3798L3.70989 16.3174C3.58725 16.0139 3.68361 15.7984 3.99898 15.671L17.5993 10.1761L13.2104 8.50668C12.8921 8.39989 12.8053 8.18488 12.9498 7.86166L13.447 6.8222Z"
                      fill="black" />
                  </svg>
                </div>
              </button>
            </div>
          </nav>

          <div class="header-hamburger-menu" id="hamburger-menu">
            <span class="bar bar1"></span>
            <span class="bar bar2"></span>
            <span class="bar bar3"></span>
          </div>
        </div>
      </div>

      <div class="overlay" id="overlay"></div>
    </header>

    <script>
      // Over Lay Function JS
      const hamBurgerIcon = document.getElementById("hamburger-menu");
      const headerActionList = document.querySelector(
        ".header-navigation-wrapper",
      );
      const overlay = document.getElementById("overlay");

      const toggleMenu = () => {
        hamBurgerIcon.classList.toggle("active");
        headerActionList.classList.toggle("show");
        overlay.classList.toggle("active");
      };

      // Toggle on hamburger click
      hamBurgerIcon.addEventListener("click", toggleMenu);

      // Close everything when clicking on the overlay
      overlay.addEventListener("click", toggleMenu);
    </script>
  </body>
</html>
