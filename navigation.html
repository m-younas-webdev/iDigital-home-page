<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Hero Section</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@600&f[]=satoshi@400,700&display=swap"
      rel="stylesheet" />
    <style>
      :root {
        --ff-clash: "Clash Display", sans-serif;
        --ff-satoshi: "Satoshi", sans-serif;
        --white: #ffffff;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--ff-satoshi);
      }

      .digital-hero-section {
        width: 100%;
        height: 100vh;
        position: relative;
        /* Background image from search results */
        background-image: url("http://googleusercontent.com/image_collection/image_retrieval/7189005639865173607_0");
        background-size: cover;
        background-position: center right; /* Highlights the image on the right side */
        display: flex;
        align-items: center;
        overflow: hidden;
      }

      /* Gradient overlay to highlight left-sided content */
      .digital-hero-section::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          to right,
          rgba(0, 0, 0, 0.8) 30%,
          rgba(0, 0, 0, 0) 70%
        );
        z-index: 1;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        width: 100%;
        position: relative;
        z-index: 2;
      }

      .digital-hero-container {
        max-width: 600px; /* Constrains content to the left side */
        color: var(--white);
      }

      .digital-hero-container-head {
        font-family: var(--ff-clash);
        font-size: 3.5rem;
        line-height: 1.1;
        margin-bottom: 20px;
      }

      .hero-container-desc {
        font-size: 1.2rem;
        margin-bottom: 30px;
        opacity: 0.9;
      }

      .cta-btn {
        padding: 15px 35px;
        font-size: 1rem;
        font-weight: 700;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        background-color: #0056ff;
        color: white;
        transition: transform 0.3s ease;
      }

      .cta-btn:hover {
        transform: translateY(-3px);
      }

      @media (max-width: 768px) {
        .digital-hero-container-head {
          font-size: 2.5rem;
        }
        .digital-hero-section::before {
          background: rgba(
            0,
            0,
            0,
            0.6
          ); /* Darken whole overlay for mobile readability */
        }
      }
    </style>
  </head>
  <body>
    <section class="digital-hero-section">
      <div class="container">
        <div class="digital-hero-container">
          <h1 class="digital-hero-container-head">
            We Provide #1 Data Recovery and Repair Services!
          </h1>
          <p class="hero-container-desc">
            Women operated business & #1 Rated in the State of Louisiana.
            Professional solutions for all your digital needs.
          </p>
          <div class="cta-buttons">
            <button class="cta-btn">Start Your Repair</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
