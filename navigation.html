<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rotating Hero Section</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden; /* Prevent scrolling for a true full-screen experience */
      }

      .hero-section {
        position: relative;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hero-version {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0; /* Initially hide all versions */
        transition: opacity 1s ease-in-out; /* Smooth cross-fade transition */
      }

      /* Make the active version visible */
      .hero-version.active {
        opacity: 1;
      }

      .version-1 {
        background-image: url("https://images.unsplash.com/photo-1518770660439-4636190af475?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1740&q=80");
        background-size: cover;
        background-position: center;
        color: #333; /* Dark text for light background */
      }

      .version-2 {
        background-image: url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=1740&q=80");
        background-size: cover;
        background-position: center;
        color: #fff; /* Light text for dark background */
      }

      /* Consistent typography for both versions */
      .hero-content h1 {
        font-size: 4rem;
        line-height: 1.2;
        margin-bottom: 20px;
      }

      .hero-content p {
        font-size: 1.5rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="hero-section">
      <div class="hero-version version-1 active">
        <div class="hero-content">
          <h1>Version 1 Title</h1>
          <p>This is the content for Version 1.</p>
        </div>
      </div>
      <div class="hero-version version-2">
        <div class="hero-content">
          <h1>Version 2 Title</h1>
          <p>This is the content for Version 2.</p>
        </div>
      </div>
    </div>

    <script>
      const versions = document.querySelectorAll(".hero-version");
      let currentVersionIndex = 0;

      function nextVersion() {
        // Remove 'active' class from current version to fade it out
        versions[currentVersionIndex].classList.remove("active");

        // Calculate next version index, looping back to the beginning
        currentVersionIndex = (currentVersionIndex + 1) % versions.length;

        // Add 'active' class to next version to fade it in
        versions[currentVersionIndex].classList.add("active");
      }

      // Set interval to rotate versions every 5 seconds (5000ms)
      setInterval(nextVersion, 5000);
    </script>
  </body>
</html>
