<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Concave Curve Divider</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      /* Top Container */
      .top-container {
        background-color: #3498db;
        color: white;
        height: 50vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* Concave Divider using SVG */
      .divider {
        position: absolute;
        bottom: 0;
        width: 100%;
        line-height: 0;
      }

      .divider svg {
        display: block;
        width: 100%;
        height: 80px; /* Adjust height for curve depth */
      }

      /* Bottom Container */
      .bottom-container {
        background-color: #2ecc71;
        color: white;
        height: 50vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      h1 {
        font-size: 3rem;
      }
    </style>
  </head>
  <body>
    <div class="top-container">
      <h1>Top Container</h1>

      <div class="divider">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none">
          <path fill="#2ecc71" d="M0,224L1440,32L1440,320L0,320Z"></path>
          <path
            fill="#2ecc71"
            d="M0,320L1440,320L1440,0C1440,0,1118,128,720,128C322,128,0,0,0,0L0,320Z"></path>
        </svg>
      </div>
    </div>

    <div class="bottom-container">
      <h1>Bottom Container</h1>
    </div>
  </body>
</html>
