<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swiper Testimonial Slider</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
      body {
        font-family: sans-serif;
        background: #f4f4f4;
        padding: 50px 0;
      }

      .swiper {
        width: 90%;
        max-width: 1200px;
        height: 250px;
      }

      .swiper-slide {
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: bold;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        border: 1px solid #eee;
      }
    </style>
  </head>
  <body>
    <div class="swiper mySwiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">Review 1</div>
        <div class="swiper-slide">Review 2</div>
        <div class="swiper-slide">Review 3</div>
        <div class="swiper-slide">Review 4</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
      const swiper = new Swiper(".mySwiper", {
        slidesPerView: 3, // Show 3 cards (3 cards dikhayen)
        spaceBetween: 30, // Gap between cards (cards ke darmiyan fasla)
        loop: true, // Infinite loop (hamesha chalta rahe)
        autoplay: {
          delay: 5000, // Wait 5 seconds (5 second ruko)
          disableOnInteraction: false,
        },
        speed: 2000, // Transition duration 2s (tabdeeli ka waqt 2s)

        // Responsive breakpoints
        breakpoints: {
          320: { slidesPerView: 1 }, // 1 card on mobile
          768: { slidesPerView: 2 }, // 2 cards on tablets
          1024: { slidesPerView: 3 }, // 3 cards on desktop
        },
      });
    </script>
  </body>
</html>
