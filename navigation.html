<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDigital Smooth Menu</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
      }

      /* Header Styles */
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
        background: #fff;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        position: relative;
        z-index: 1001;
      }

      .logo {
        font-size: 24px;
        font-weight: bold;
      }

      /* Hamburger Button */
      .toggle-btn {
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 5px;
        border: none;
        background: none;
      }
      .toggle-btn span {
        width: 30px;
        height: 3px;
        background: black;
        transition: 0.3s;
      }

      /* Overlay - Smooth Fade */
      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 999;
        /* Smooth Logic */
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.6s ease,
          visibility 0.6s ease;
      }
      .overlay.active {
        opacity: 1;
        visibility: visible;
      }

      /* Menu Bar - Smooth Slide */
      .menu-bar {
        position: fixed;
        top: 0;
        right: 0;
        width: 550px;
        max-width: 80%; /* For small screens */
        height: 100%;
        background: white;
        z-index: 1000;
        padding: 100px 40px;
        /* Smooth Logic */
        transform: translateX(100%);
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .menu-bar.active {
        transform: translateX(0);
      }

      .menu-bar ul {
        list-style: none;
      }
      .menu-bar li {
        margin: 20px 0;
        font-size: 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">IDigital</div>
      <button class="toggle-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <div class="overlay" id="overlay"></div>

    <nav class="menu-bar" id="menuBar">
      <ul>
        <li>Home</li>
        <li>Services</li>
        <li>Support</li>
        <li>Shop</li>
      </ul>
    </nav>

    <script>
      const menuBtn = document.getElementById("menuBtn");
      const menuBar = document.getElementById("menuBar");
      const overlay = document.getElementById("overlay");

      const toggle = () => {
        menuBar.classList.toggle("active");
        overlay.classList.toggle("active");
      };

      menuBtn.addEventListener("click", toggle);
      overlay.addEventListener("click", toggle);
    </script>
  </body>
</html>
