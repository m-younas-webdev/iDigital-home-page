<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Infinite Logo Slider</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
      .swiper {
        width: 100%;
        padding: 50px 0;
      }

      .swiper-slide {
        width: 120px !important; /* Fixed width 120px */
        margin-right: 20px; /* 20px gap */
      }

      .swiper-slide img {
        width: 120px;
        height: auto;
        display: block;
      }

      /* Smooth continuous transition */
      .swiper-wrapper {
        transition-timing-function: linear !important;
      }
    </style>
  </head>
  <body>
    <div class="swiper mySwiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide"
          ><a href="https://google.com"
            ><img src="assets/media/company-logo-1.png" alt="Logo" /></a
        ></div>
        <div class="swiper-slide"
          ><a href="https://google.com"
            ><img src="assets/media/company-logo-2.png" alt="Logo" /></a
        ></div>
        <div class="swiper-slide"
          ><a href="https://google.com"
            ><img src="assets/media/company-logo-4.png" alt="Logo" /></a
        ></div>
        <div class="swiper-slide"
          ><a href="https://google.com"
            ><img src="assets/media/company-logo-3.png" alt="Logo" /></a
        ></div>
        <div class="swiper-slide"
          ><a href="https://google.com"
            ><img src="assets/media/company-logo-5.png" alt="Logo" /></a
        ></div>
        <div class="swiper-slide"
          ><a href="https://google.com"
            ><img src="assets/media/company-logo-6.png" alt="Logo" /></a
        ></div>
        <div class="swiper-slide"
          ><a href="https://google.com"
            ><img src="assets/media/company-logo-5.png" alt="Logo" /></a
        ></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
      var swiper = new Swiper(".mySwiper", {
        loop: true, // Infinite loop
        spaceBetween: 20, // 20px gap
        slidesPerView: "auto", // Based on 120px width
        speed: 3000, // Movement speed
        autoplay: {
          delay: 0, // No pause
          disableOnInteraction: false,
        },
        allowTouchMove: false, // Pure auto-scroll
      });
    </script>
  </body>
</html>
